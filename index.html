<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KYSGBS – Gestion des Absences</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══ HEADER ══════════════════════════════════════════════ -->
  <div class="header">
    <div class="header-inner">

      <div class="logo-circle">
        <img src="WhatsApp Image 2026-01-15 at 08.58.23.jpeg" alt="Logo KYSGBS" />
      </div>

      <div>
        <h1>Appel Quotidien</h1>
        <p>Keur Yaye Sokhna Gueye</p>
        <div id="date-display"></div>
      </div>

    </div>
  </div>

  <!-- ══ CONTENU PRINCIPAL ════════════════════════════════════ -->
  <div class="wrap">

    <!-- Sélecteur de classe -->
    <div class="class-select-wrap">
      <label for="classe-select">Classe</label>
      <select id="classe-select"></select>
    </div>

    <!-- Statistiques rapides -->
    <div class="stats">
      <div class="stat-card stat-total">
        <div class="stat-label">Total</div>
        <div class="stat-num" id="count-total">0</div>
      </div>
      <div class="stat-card stat-p">
        <div class="stat-label">Présents</div>
        <div class="stat-num" id="count-p">0</div>
      </div>
      <div class="stat-card stat-r">
        <div class="stat-label">Retards</div>
        <div class="stat-num" id="count-r">0</div>
      </div>
      <div class="stat-card stat-a">
        <div class="stat-label">Absents</div>
        <div class="stat-num" id="count-a">0</div>
      </div>
    </div>

    <!-- Liste des élèves (injectée par JS) -->
    <div id="liste-eleves"></div>

    <!-- Boutons d'action -->
    <div class="actions">
      <button class="btn-wa" onclick="genererRapport()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
          <path d="M12 0C5.373 0 0 5.373 0 12c0 2.136.565 4.14 1.545 5.873L.057 23.7a.75.75 0 00.918.978l5.98-1.453A11.956 11.956 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.96 0-3.803-.524-5.393-1.436l-.38-.225-3.993.97.998-3.877-.248-.39A9.96 9.96 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/>
        </svg>
        Envoyer le Rapport WhatsApp
      </button>
      <button class="btn-reset" onclick="reinitialiserAppel()">
        ↺ Réinitialiser l'appel du jour
      </button>
    </div>

  </div>

  <!-- Toast de confirmation -->
  <div class="toast" id="toast"></div>

  <!-- Script -->
  <script src="app.js"></script>

</body>
</html>
